<section id="title-slide" class="center">

  <!-- Background image/GIF — swap src or replace <img> with <video> for video -->
  <div class="title-bg-media">
    <img
      src="figures/brain_network.png"
      alt=""
      aria-hidden="true"
      class="title-bg-image"
    />
  </div>

  $if(title)$<h1 class="title">$title$</h1>$endif$
  $if(subtitle)$<p class="subtitle">$subtitle$</p>$endif$

  $if(author)$
  <div class="quarto-title-authors">
    $for(author)$
    <div class="quarto-title-author">
      <div class="quarto-title-author-name">
        $it.name$
        $if(it.orcid)$
        <a
          href="https://orcid.org/$it.orcid$"
          class="quarto-title-author-orcid"
          target="_blank"
          rel="noopener"
          title="ORCID: $it.orcid$"
        >&#x1D4DE;</a>
        $endif$
      </div>
      $if(it.affiliations)$
      <div class="quarto-title-affiliation">
        $for(it.affiliations)$<span>$it.name$</span>$sep$<br>$endfor$
      </div>
      $endif$
      $if(it.email)$
      <div class="quarto-title-author-email">
        <a href="mailto:$it.email$">$it.email$</a>
      </div>
      $endif$
    </div>
    $endfor$
  </div>
  $endif$

  $if(date)$<p class="date">$date$</p>$endif$

</section>
