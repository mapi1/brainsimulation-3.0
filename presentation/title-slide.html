<section id="$idprefix$title-slide" $for(title-slide-attributes/pairs)$ $it.key$="$it.value$" $endfor$
    class="quarto-title-block">
    <div class="title-bg-media" aria-hidden="true">
        <img src="figures/Titleslide/background.png" alt="" class="title-bg-image" />
    </div>

    <h1 class="title">$title$</h1>
    $if(subtitle)$
    <p class="subtitle">$subtitle$</p>
    $endif$

    <div style="font-size: calc(1rem + 0.2vw);">
        $for(by-author)$
        <span>
            $if(by-author.attributes.corresponding)$<strong>$endif$$if(by-author.name.literal)$$by-author.name.literal$$endif$$if(by-author.attributes.corresponding)$</strong>$endif$,
        </span>
        $endfor$
    </div>

    $if(date)$
    <p class="date">$date$</p>
    $endif$
</section>
