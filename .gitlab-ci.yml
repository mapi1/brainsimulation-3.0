# ─────────────────────────────────────────────────────────────────────────────
# GitLab CI — render Quarto presentation → deploy to GitLab Pages
#
# Deployment:
#   GitLab Pages — artifacts-based (public/), served at your GitLab Pages URL
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - render
  - deploy

variables:
  QUARTO_VERSION: "1.7.24"
  PYTHON_VERSION: "3.13"
  # Point at the rendered presentation inside the repo
  PRESENTATION_DIR: "presentation"
  PRESENTATION_QMD: "index.qmd"
  OUTPUT_HTML: "presentation.html"

# ── Shared setup template (macOS shell executor) ─────────────────────────────
.install_quarto: &install_quarto
  - |
    if command -v quarto &>/dev/null && [[ "$(quarto --version)" == "${QUARTO_VERSION}" ]]; then
      echo "Quarto ${QUARTO_VERSION} already installed"
    else
      ARCH=$(uname -m)
      URL="https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-macos.pkg"
      curl -fsSL "$URL" -o /tmp/quarto.pkg
      sudo installer -pkg /tmp/quarto.pkg -target /
      rm /tmp/quarto.pkg
    fi
  - quarto check install

# ── Job: render ──────────────────────────────────────────────────────────────
render:
  stage: render
  before_script:
    - *install_quarto
    # Install uv if not already available
    - command -v uv &>/dev/null || curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    # Create venv and install dependencies
    - uv venv .venv --python ${PYTHON_VERSION}
    - source .venv/bin/activate
    - uv pip install tvbo[all] bsplot jupyter-cache
  script:
    - source .venv/bin/activate
    - cd ${PRESENTATION_DIR}
    - quarto render ${PRESENTATION_QMD} --output ${OUTPUT_HTML}
    - ls -lh ${OUTPUT_HTML}
  artifacts:
    name: "presentation-html"
    paths:
      - ${PRESENTATION_DIR}/${OUTPUT_HTML}
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── Job: pages (GitLab Pages) ────────────────────────────────────────────────
# Must be named exactly "pages" and produce a "public/" artifact.
# Served at: https://<namespace>.pages.<gitlab-host>/<project>/
pages:
  stage: deploy
  needs:
    - job: render
      artifacts: true
  script:
    - mkdir -p public
    - cp ${PRESENTATION_DIR}/${OUTPUT_HTML} public/index.html
    - echo "Deployed to GitLab Pages → public/index.html"
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
